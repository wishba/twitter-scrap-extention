<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tweet Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e8e8;
      --muted:    #666;
      --accent:   #1d9bf0;
      --danger:   #f4212e;
      --success:  #00ba7c;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 16px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }

    /* ── Counter ── */
    .counter-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .counter-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .counter-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
      transition: color 0.2s;
    }

    .counter-value.zero { color: var(--muted); }

    .counter-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }
    .btn:not(:disabled):active { opacity: 0.7; }

    .btn-download {
      background: var(--accent);
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-clear {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-clear:not(:disabled):hover {
      border-color: var(--danger);
      color: var(--danger);
      opacity: 1;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Toast ── */
    .toast {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--mono);
      display: none;
      align-items: center;
      gap: 7px;
    }

    .toast.show { display: flex; }
    .toast.success { background: #0a2a1f; border: 1px solid #00ba7c44; color: var(--success); }
    .toast.error   { background: #2a0a0a; border: 1px solid #f4212e44; color: var(--danger); }

    .toast svg { width: 13px; height: 13px; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <!-- Bird/download icon -->
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span class="logo-text">TWEET SCRAPER</span>
    </div>
    <div class="status-dot" id="statusDot" title="Listening for tweets"></div>
  </div>

  <div class="counter-block">
    <div class="counter-label">Tweets captured</div>
    <div class="counter-value zero" id="counterValue">0</div>
    <div class="counter-sub" id="counterSub">Scroll your feed to capture tweets</div>
  </div>

  <button class="btn btn-download" id="btnDownload" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download JSON + media
  </button>

  <button class="btn btn-clear" id="btnClear" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    Clear captured tweets
  </button>

  <div class="toast" id="toast">
    <svg id="toastIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    <span id="toastMsg"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
